<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seite im Aufbau</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #333;
    }
    .notice {
      text-align: center;
      padding: 2rem;
      max-width: 28rem;
    }
    .notice h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
    }
    .notice p {
      margin: 0;
      line-height: 1.5;
      color: #555;
    }
    .date {
      margin-top: 1.5rem;
      font-weight: 600;
      color: #222;
    }
  </style>
</head>
<body>
  <div class="notice">
    <h1>Seite im Aufbau</h1>
    <p>Der Mobilomat befindet sich derzeit im Aufbau.</p>
    <p class="date">Freischaltung am 02. April</p>
  </div>
</body>
</html>
